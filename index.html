<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mesto</title>
    <link rel="stylesheet" href="./src/pages/index.css" />
  </head>
  <body class="app-root">
    <div class="app-root__content">
      <div class="app-header app-root__section">
        <img
          src="./src/images/logo.svg"
          alt="Логотип проекта место"
          class="logo app-header__logo"
        />
      </div>
      <div class="app-main">
        <div class="user-panel app-root__section">
          <div
            class="user-panel__image"
            style="background-image: url('./src/images/avatar.jpg')"
          ></div>
          <div class="user-panel__info">
            <h1 class="user-panel__title"></h1>
            <button class="user-panel__edit-button" type="button"></button>
            <p class="user-panel__description"></p>
          </div>
          <button class="user-panel__add-button" type="button"></button>
        </div>
        <div class="photo-grid app-root__section">
          <ul class="photo-grid__list"></ul>
        </div>
      </div>
      <div class="app-footer app-root__section">
        <p class="app-footer__copyright">© 2025 Mesto Russia</p>
      </div>

      <div class="overlay-dialog overlay-dialog_type_edit">
        <div class="overlay-dialog__content">
          <button type="button" class="overlay-dialog__close"></button>
          <h3 class="overlay-dialog__title">Редактировать профиль</h3>
          <form class="overlay-dialog__form" name="edit-user-panel" novalidate>
            <label class="overlay-dialog__label">
              <input
                type="text"
                name="user-name"
                id="user-name"
                class="overlay-dialog__input overlay-dialog__input_type_name"
                placeholder="Имя"
                required
                minlength="2"
                maxlength="40"
                pattern="^[a-zA-Zа-яА-ЯёЁ\-\s]+$"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              />
              <span class="overlay-dialog__error" id="user-name-error"></span>
            </label>
            <label class="overlay-dialog__label">
              <input
                type="text"
                name="user-description"
                id="user-description"
                class="overlay-dialog__input overlay-dialog__input_type_description"
                placeholder="Занятие"
                required
                minlength="2"
                maxlength="200"
              />
              <span class="overlay-dialog__error" id="user-description-error"></span>
            </label>
            <button
              type="submit"
              class="button overlay-dialog__button overlay-dialog__button_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>

      <div class="overlay-dialog overlay-dialog_type_new-photo-card">
        <div class="overlay-dialog__content">
          <button type="button" class="overlay-dialog__close"></button>
          <h3 class="overlay-dialog__title">Новое место</h3>
          <form class="overlay-dialog__form" name="new-place" novalidate>
            <label class="overlay-dialog__label">
              <input
                type="text"
                name="place-name"
                id="place-name"
                class="overlay-dialog__input overlay-dialog__input_type_card-name"
                placeholder="Название"
                required
                minlength="2"
                maxlength="30"
                pattern="^[a-zA-Zа-яА-ЯёЁ\-\s]+$"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              />
              <span class="overlay-dialog__error" id="place-name-error"></span>
            </label>
            <label class="overlay-dialog__label">
              <input
                type="url"
                name="place-link"
                id="place-link"
                class="overlay-dialog__input overlay-dialog__input_type_url"
                placeholder="Ссылка на картинку"
                required
              />
              <span class="overlay-dialog__error" id="place-link-error"></span>
            </label>
            <button
              type="submit"
              class="button overlay-dialog__button overlay-dialog__button_disabled"
              disabled
            >
              Создать
            </button>
          </form>
        </div>
      </div>

      <div class="overlay-dialog overlay-dialog_type_image">
        <div class="overlay-dialog__content overlay-dialog__content_content_image">
          <button type="button" class="overlay-dialog__close"></button>
          <img src="" alt="" class="overlay-dialog__image" />
          <p class="overlay-dialog__caption"></p>
        </div>
      </div>

      <div class="overlay-dialog overlay-dialog_type_remove-photo-card">
        <div class="overlay-dialog__content">
          <button type="button" class="overlay-dialog__close"></button>
          <h3 class="overlay-dialog__title">Вы уверены?</h3>
          <form class="overlay-dialog__form" name="remove-photo-card" novalidate>
            <button type="submit" class="button overlay-dialog__button">Да</button>
          </form>
        </div>
      </div>

      <div class="overlay-dialog overlay-dialog_type_edit-avatar">
        <div class="overlay-dialog__content">
          <button type="button" class="overlay-dialog__close"></button>
          <h3 class="overlay-dialog__title">Обновить аватар</h3>
          <form class="overlay-dialog__form" name="edit-avatar" novalidate>
            <label class="overlay-dialog__label">
              <input
                type="url"
                name="user-avatar"
                id="user-avatar"
                class="overlay-dialog__input overlay-dialog__input_type_avatar"
                placeholder="Ссылка на изображение"
                required
              />
              <span class="overlay-dialog__error" id="user-avatar-error"></span>
            </label>
            <button
              type="submit"
              class="button overlay-dialog__button overlay-dialog__button_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="./src/scripts/index.js" defer type="module"></script>

    <template id="photo-card-template">
      <li class="photo-grid__item photo-card">
        <img class="photo-card__image" src="" alt="" />
        <div class="photo-card__control">
          <button
            type="button"
            class="photo-card__control-button photo-card__control-button_type_delete"
          ></button>
        </div>
        <div class="photo-card__description">
          <h2 class="photo-card__title"></h2>
          <div class="photo-card__likes">
            <button type="button" class="photo-card__like-button"></button>
            <span class="photo-card__like-count">0</span>
          </div>
        </div>
      </li>
    </template>


    <div class="overlay-dialog overlay-dialog_type_info">
      <div class="overlay-dialog__content overlay-dialog__content_content_info">
        <button type="button" class="overlay-dialog__close"></button>
        <h3 class="overlay-dialog__title"></h3>
        <dl class="overlay-dialog__info"></dl>
        <h4 class="overlay-dialog__text"></h4>
        <ul class="overlay-dialog__list"></ul>
      </div>
    </div>

    <template id="overlay-dialog-info-definition-template">
      <div class="overlay-dialog__info-item">
        <dt class="overlay-dialog__info-term"></dt>
        <dd class="overlay-dialog__info-description"></dd>
      </div>
    </template>

    <template id="overlay-dialog-info-user-preview-template">
      <li class="overlay-dialog__list-item overlay-dialog__list-item_type_badge"></li>
    </template>
  </body>
</html>
